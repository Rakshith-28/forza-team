openapi: 3.0.3
info:
  title: Soccer Club Management App API
  version: 1.0.0-draft
  description: |
    Draft OpenAPI / Swagger YAML for the Soccer Club Management App.
    This starter spec is aligned to the previously defined API contract and covers:
    - Authentication
    - Clubs / Teams / Seasons
    - Players / Parents / Roster
    - Events / RSVP / Attendance
    - Registration / Billing / Waivers
    - Evaluations / Radar Comparison / Development Goals
    - Notifications
    - AI Assistant
servers:
  - url: /api/v1
    description: Relative API base path

tags:
  - name: Auth
  - name: Master Admin
  - name: Clubs
  - name: Seasons
  - name: Teams
  - name: Players
  - name: Parents
  - name: Files
  - name: Announcements
  - name: Messages
  - name: Events
  - name: Registration
  - name: Billing
  - name: Waivers
  - name: Evaluations
  - name: Development
  - name: Notifications
  - name: AI
  - name: Reports

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RefreshTokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile and active roles
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthMeResponse'

  /auth/switch-role:
    post:
      tags: [Auth]
      summary: Switch active role assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchRoleRequest'
      responses:
        '200':
          description: New token for selected role context
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RefreshTokenResponse'

  /master/clubs:
    get:
      tags: [Master Admin]
      summary: List all clubs
      parameters:
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Club list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubListResponse'
    post:
      tags: [Master Admin]
      summary: Create club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClubRequest'
      responses:
        '201':
          description: Club created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetailResponse'

  /master/clubs/{clubId}:
    get:
      tags: [Master Admin]
      summary: Get club detail
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      responses:
        '200':
          description: Club detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetailResponse'
    put:
      tags: [Master Admin]
      summary: Update club
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClubRequest'
      responses:
        '200':
          description: Club updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetailResponse'

  /master/clubs/{clubId}/status:
    patch:
      tags: [Master Admin]
      summary: Update club status
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          description: Club status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubDetailResponse'

  /master/clubs/{clubId}/admins:
    post:
      tags: [Master Admin]
      summary: Invite initial club admin
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClubAdminRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvitationResponse'

  /clubs/{clubId}/dashboard:
    get:
      tags: [Clubs]
      summary: Club dashboard summary
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      responses:
        '200':
          description: Club dashboard metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClubDashboardSummary'

  /clubs/{clubId}/settings:
    get:
      tags: [Clubs]
      summary: Get club settings
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      responses:
        '200':
          description: Club settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClubSettings'
    put:
      tags: [Clubs]
      summary: Update club settings
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClubSettingsRequest'
      responses:
        '200':
          description: Club settings updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClubSettings'

  /clubs/{clubId}/seasons:
    get:
      tags: [Seasons]
      summary: List seasons for club
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      responses:
        '200':
          description: Seasons list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonListResponse'
    post:
      tags: [Seasons]
      summary: Create season
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSeasonRequest'
      responses:
        '201':
          description: Season created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonDetailResponse'

  /seasons/{seasonId}:
    get:
      tags: [Seasons]
      summary: Get season detail
      parameters:
        - $ref: '#/components/parameters/SeasonIdPath'
      responses:
        '200':
          description: Season detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonDetailResponse'
    put:
      tags: [Seasons]
      summary: Update season
      parameters:
        - $ref: '#/components/parameters/SeasonIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSeasonRequest'
      responses:
        '200':
          description: Season updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonDetailResponse'

  /clubs/{clubId}/teams:
    get:
      tags: [Teams]
      summary: List teams for club
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
        - $ref: '#/components/parameters/SearchQuery'
        - in: query
          name: season_id
          schema:
            type: string
            format: uuid
        - in: query
          name: age_group
          schema:
            type: string
        - $ref: '#/components/parameters/StatusQuery'
      responses:
        '200':
          description: Team list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
    post:
      tags: [Teams]
      summary: Create team
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetailResponse'

  /teams/{teamId}:
    get:
      tags: [Teams]
      summary: Get team detail
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      responses:
        '200':
          description: Team detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetailResponse'
    put:
      tags: [Teams]
      summary: Update team
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetailResponse'

  /teams/{teamId}/status:
    patch:
      tags: [Teams]
      summary: Update team status
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          description: Team status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamDetailResponse'

  /teams/{teamId}/coaches:
    get:
      tags: [Teams]
      summary: List team coaches
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      responses:
        '200':
          description: Team coaches list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachAssignmentListResponse'
    post:
      tags: [Teams]
      summary: Assign coach to team
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCoachRequest'
      responses:
        '201':
          description: Coach assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachAssignmentResponse'

  /teams/{teamId}/coaches/{userId}:
    delete:
      tags: [Teams]
      summary: Remove coach from team
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: Coach removed

  /clubs/{clubId}/users:
    get:
      tags: [Clubs]
      summary: List club users
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
        - $ref: '#/components/parameters/SearchQuery'
        - in: query
          name: role_code
          schema:
            $ref: '#/components/schemas/RoleCode'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Club users list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubUserListResponse'

  /teams/{teamId}/players:
    get:
      tags: [Players]
      summary: List team roster
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/StatusQuery'
        - in: query
          name: position
          schema:
            $ref: '#/components/schemas/PositionCode'
        - in: query
          name: include
          schema:
            type: string
            example: parents,evaluations
      responses:
        '200':
          description: Team roster list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PlayerFullListResponse'
                  - $ref: '#/components/schemas/PlayerSafeListResponse'
    post:
      tags: [Players]
      summary: Add player to team
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlayerRequest'
      responses:
        '201':
          description: Player added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreatePlayerResponse'

  /players/{playerId}:
    get:
      tags: [Players]
      summary: Get player detail
      parameters:
        - $ref: '#/components/parameters/PlayerIdPath'
      responses:
        '200':
          description: Player detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerDetailResponse'
    put:
      tags: [Players]
      summary: Update player
      parameters:
        - $ref: '#/components/parameters/PlayerIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlayerRequest'
      responses:
        '200':
          description: Player updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerDetailResponse'

  /players/{playerId}/parents:
    post:
      tags: [Parents]
      summary: Link parent to player
      parameters:
        - $ref: '#/components/parameters/PlayerIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkParentRequest'
      responses:
        '201':
          description: Parent linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentLinkResponse'

  /players/{playerId}/parents/{parentId}:
    delete:
      tags: [Parents]
      summary: Remove parent link from player
      parameters:
        - $ref: '#/components/parameters/PlayerIdPath'
        - $ref: '#/components/parameters/ParentIdPath'
      responses:
        '204':
          description: Parent link removed

  /parents/me/children:
    get:
      tags: [Parents]
      summary: List authenticated parent's linked children
      responses:
        '200':
          description: Linked children list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentChildrenResponse'

  /files:
    post:
      tags: [Files]
      summary: Upload file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, purpose, club_id]
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
                club_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'

  /files/{fileId}:
    get:
      tags: [Files]
      summary: Get file metadata
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadataResponse'

  /announcements:
    get:
      tags: [Announcements]
      summary: List announcements
      parameters:
        - in: query
          name: club_id
          schema:
            type: string
            format: uuid
        - in: query
          name: team_id
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Announcement list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementListResponse'
    post:
      tags: [Announcements]
      summary: Create announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnnouncementRequest'
      responses:
        '201':
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementDetailResponse'

  /teams/{teamId}/messages:
    get:
      tags: [Messages]
      summary: List team messages
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Team messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
    post:
      tags: [Messages]
      summary: Send team message
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '201':
          description: Team message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponseEnvelope'

  /teams/{teamId}/events:
    get:
      tags: [Events]
      summary: List team events
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: event_type
          schema:
            $ref: '#/components/schemas/EventType'
        - $ref: '#/components/parameters/StatusQuery'
      responses:
        '200':
          description: Team events list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
    post:
      tags: [Events]
      summary: Create team event
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetailResponse'

  /events/{eventId}:
    get:
      tags: [Events]
      summary: Get event detail
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Event detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetailResponse'
    put:
      tags: [Events]
      summary: Update event
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetailResponse'

  /events/{eventId}/rsvps:
    post:
      tags: [Events]
      summary: Submit RSVP for child
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRsvpRequest'
      responses:
        '200':
          description: RSVP submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RsvpResponseEnvelope'
    get:
      tags: [Events]
      summary: List RSVPs for event
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: RSVP list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RsvpListResponse'

  /events/{eventId}/attendance:
    get:
      tags: [Events]
      summary: List attendance for event
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '200':
          description: Attendance list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceListResponse'
    post:
      tags: [Events]
      summary: Record attendance for event
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordAttendanceRequest'
      responses:
        '200':
          description: Attendance recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedCountResponse'

  /parents/me/schedule:
    get:
      tags: [Events]
      summary: Parent aggregated child schedule
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: player_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Parent schedule feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParentScheduleResponse'

  /clubs/{clubId}/registration-programs:
    get:
      tags: [Registration]
      summary: List registration programs
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      responses:
        '200':
          description: Registration programs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationProgramListResponse'
    post:
      tags: [Registration]
      summary: Create registration program
      parameters:
        - $ref: '#/components/parameters/ClubIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegistrationProgramRequest'
      responses:
        '201':
          description: Registration program created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationProgramDetailResponse'

  /registration-programs/{programId}/forms:
    post:
      tags: [Registration]
      summary: Create registration form version
      parameters:
        - $ref: '#/components/parameters/ProgramIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRegistrationFormRequest'
      responses:
        '201':
          description: Registration form created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationFormDetailResponse'

  /registration-submissions:
    post:
      tags: [Registration]
      summary: Submit registration
      requestBody:
        required: true
