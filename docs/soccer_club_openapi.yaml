      in: path
      name: clubId
      required: true
      schema:
        type: string
        format: uuid
    SeasonIdPath:
      in: path
      name: seasonId
      required: true
      schema:
        type: string
        format: uuid
    TeamIdPath:
      in: path
      name: teamId
      required: true
      schema:
        type: string
        format: uuid
    UserIdPath:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    PlayerIdPath:
      in: path
      name: playerId
      required: true
      schema:
        type: string
        format: uuid
    ParentIdPath:
      in: path
      name: parentId
      required: true
      schema:
        type: string
        format: uuid
    FileIdPath:
      in: path
      name: fileId
      required: true
      schema:
        type: string
        format: uuid
    EventIdPath:
      in: path
      name: eventId
      required: true
      schema:
        type: string
        format: uuid
    ProgramIdPath:
      in: path
      name: programId
      required: true
      schema:
        type: string
        format: uuid
    SubmissionIdPath:
      in: path
      name: submissionId
      required: true
      schema:
        type: string
        format: uuid
    InvoiceIdPath:
      in: path
      name: invoiceId
      required: true
      schema:
        type: string
        format: uuid
    WaiverIdPath:
