name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Prisma 7 requires Node 20.19+, 22.12+, or 24+ (odd releases like
          # 23.x are unsupported).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so `next build` can evaluate server
          # modules without a real database. No connection is made at build
          # time; real values come from Vercel/GitHub secrets at runtime.
          DATABASE_URL: postgresql://user:pass@localhost:5432/forza
          DIRECT_URL: postgresql://user:pass@localhost:5432/forza
          AUTH_SECRET: ci-placeholder-secret-min-32-characters-long
